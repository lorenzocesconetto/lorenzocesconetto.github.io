title: Lorenzo Cesconetto
email: lorenzo@lorenzocesconetto.com.br
description: > # this means to ignore newlines until "baseurl:"
  We write about entrepreneurship, university and life meaning. This blog is designed to help people find passion in life!
permalink: ':title/'

# baseurl: # the subpath of your site, e.g. /blog
url: "http://lorenzocesconetto.com.br" # the base hostname & protocol for your site, e.g. http://example.com

# Set Timezone in Sao Paulo
timezone: America/Sao_Paulo

# Author settings
author: Lorenzo Cesconetto # add your name
author-pic: lorenzo.jpg
about-author: Hi! My name is Lorenzo. I write this blog posts to share some thoughts on career, technology and life!

# phone: # Add your Phone number
website: lorenzocesconetto.com.br # Add your website, do not add http://
linkedin: /lorenzo-cesconetto/ # Add your Linkedin handle
# github: #artemsheludko # Add your Github handle
# twitter: #'@artemsheludko_' # Add your Twitter handle
facebook: lorenzo.cesconeto # Add your Facebook handle
instagram: lorenzo.cesconetto # Add your Instagram handle
# pinterest: # Add your Pinterest handle

# Newsletter
mailchimp: lorenzocesconetto.us17.list-manage.com/subscribe/post?u=58a81bd5376d7fcccb57e2ce6&amp;id=4bb34e0f21 # Add your MailChimp form identifier.

# Disqus
discus_identifier: lorenzocesconetto-com # Add your discus identifier

# Tracker
analytics: UA-111507718-1 # Google Analytics

# Paginate
paginate: 6
paginate_path: /page:num/

# Build settings
markdown: kramdown
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-sitemap

include: [_pages]
exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
